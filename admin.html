<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ailabs gen pro - Admin Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Base Background Gelap Mulus */
        body {
            background: radial-gradient(circle at 50% 0%, #0a1128, #000000 80%);
            color: #ffffff;
            min-height: 100vh;
            font-family: 'Inter', system-ui, sans-serif;
            overflow-x: hidden;
        }

        /* Glassmorphism Panel */
        .glass-panel {
            background: rgba(10, 15, 25, 0.6);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(0, 162, 255, 0.2);
            box-shadow: 0 8px 32px 0 rgba(0, 120, 255, 0.1);
            border-radius: 16px;
        }

        /* Input Styling */
        .glass-input {
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(0, 162, 255, 0.3);
            color: white;
            transition: all 0.3s ease;
        }
        .glass-input:focus {
            outline: none;
            border-color: rgba(0, 162, 255, 1);
            box-shadow: 0 0 15px rgba(0, 162, 255, 0.3);
        }

        /* Buttons */
        .btn-glow-blue {
            background: linear-gradient(90deg, #0044cc, #0099ff);
            box-shadow: 0 0 15px rgba(0, 153, 255, 0.4);
            transition: all 0.3s ease;
        }
        .btn-glow-blue:hover {
            box-shadow: 0 0 25px rgba(0, 153, 255, 0.7);
            transform: translateY(-1px);
        }

        .btn-glow-red {
            background: linear-gradient(90deg, #cc0000, #ff3333);
            box-shadow: 0 0 15px rgba(255, 51, 51, 0.4);
            transition: all 0.3s ease;
        }
        .btn-glow-red:hover {
            box-shadow: 0 0 25px rgba(255, 51, 51, 0.7);
            transform: translateY(-1px);
        }

        /* Table Styling */
        .glass-table th {
            background: rgba(0, 162, 255, 0.1);
            border-bottom: 1px solid rgba(0, 162, 255, 0.3);
        }
        .glass-table td {
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }
        .glass-table tr:hover td {
            background: rgba(0, 162, 255, 0.05);
        }
    </style>
</head>
<body class="p-4 md:p-8">

    <div class="flex flex-col md:flex-row justify-between items-center mb-8 gap-4">
        <div class="flex items-center gap-4">
            <img src="https://i.ibb.co.com/4nFbhTSN/Desain-tanpa-judul-20260428-191052-0000.png" alt="Logo" class="w-12 md:w-16 drop-shadow-[0_0_10px_rgba(0,150,255,0.6)]">
            <div>
                <h1 class="text-xl md:text-2xl font-bold text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-blue-200">Admin Control Panel</h1>
                <p class="text-xs md:text-sm text-blue-300/70">Ailabs gen pro - Access Management</p>
            </div>
        </div>
        <div class="glass-panel px-6 py-2 flex items-center gap-3">
            <div id="statusDot" class="w-3 h-3 rounded-full bg-yellow-500 shadow-[0_0_10px_#eab308] animate-pulse"></div>
            <span id="statusText" class="text-sm font-semibold text-yellow-400">Menghubungkan...</span>
        </div>
    </div>

    <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
        
        <div class="space-y-6 lg:col-span-1">
            <div class="glass-panel p-6 flex items-center justify-between">
                <div>
                    <p class="text-gray-400 text-sm mb-1">Total Akses Aktif</p>
                    <h2 class="text-4xl font-bold text-blue-400" id="totalUsersCount">0</h2>
                </div>
                <svg class="w-12 h-12 text-blue-500/30" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z"></path></svg>
            </div>

            <div class="glass-panel p-6">
                <h3 class="text-lg font-semibold text-blue-300 mb-4 flex items-center gap-2">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M18 9v3m0 0v3m0-3h3m-3 0h-3m-2-5a4 4 0 11-8 0 4 4 0 018 0zM3 20a6 6 0 0112 0v1H3v-1z"></path></svg>
                    Daftarkan Akses Baru
                </h3>
                <form id="addUserForm">
                    <div class="mb-4">
                        <label class="block text-xs text-gray-400 mb-2">Alamat Gmail User</label>
                        <input type="email" id="newUserEmail" required placeholder="contoh@gmail.com" class="glass-input w-full px-4 py-3 rounded-lg text-sm">
                    </div>
                    <button type="submit" id="addBtn" class="btn-glow-blue w-full py-3 rounded-lg text-sm font-bold text-white flex justify-center items-center gap-2">
                        Berikan Akses
                    </button>
                </form>
            </div>
        </div>

        <div class="glass-panel p-6 lg:col-span-2 flex flex-col h-[500px]">
            <div class="flex justify-between items-center mb-4">
                <h3 class="text-lg font-semibold text-blue-300">Daftar Gmail Terdaftar</h3>
                <div class="relative">
                    <input type="text" id="searchInput" onkeyup="filterUsers()" placeholder="Cari Gmail..." class="glass-input pl-9 pr-4 py-2 rounded-full text-xs w-48 md:w-64">
                    <svg class="w-4 h-4 text-gray-400 absolute left-3 top-2.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
                </div>
            </div>

            <div class="overflow-y-auto flex-1 pr-2 custom-scrollbar">
                <table class="w-full text-left border-collapse glass-table text-sm">
                    <thead>
                        <tr>
                            <th class="py-3 px-4 rounded-tl-lg font-medium text-blue-300">Email (Akun Google)</th>
                            <th class="py-3 px-4 font-medium text-blue-300">Tanggal Daftar</th>
                            <th class="py-3 px-4 font-medium text-blue-300 text-center">Status</th>
                            <th class="py-3 px-4 rounded-tr-lg font-medium text-blue-300 text-right">Aksi</th>
                        </tr>
                    </thead>
                    <tbody id="userTableBody">
                        <tr><td colspan="4" class="text-center py-8 text-gray-500">Memuat data dari database...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <div id="messageBox" class="fixed inset-0 z-[60] hidden flex-col items-center justify-center bg-black/80 backdrop-blur-sm px-4">
        <div class="glass-panel p-6 md:p-8 max-w-sm w-full text-center border border-blue-500/30">
            <h3 class="text-lg md:text-xl font-bold text-blue-400 mb-2" id="messageTitle">Pemberitahuan</h3>
            <p class="text-[13px] md:text-base text-gray-300 mb-6" id="messageText">Pesan di sini</p>
            <div class="flex gap-3 justify-center" id="messageButtons">
                <button onclick="closeMessage()" class="btn-glow-blue px-6 py-2 rounded-xl text-sm font-bold text-white w-full">Tutup</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getFirestore, collection, doc, setDoc, deleteDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // Config Asli Punya Bangpro
        const firebaseConfig = {
            apiKey: "AIzaSyAda9zOqMGJmIR0HmHTn0M32vvwH3y4mU4",
            authDomain: "ailabs-new-1.firebaseapp.com",
            projectId: "ailabs-new-1",
            storageBucket: "ailabs-new-1.firebasestorage.app",
            messagingSenderId: "485654286517",
            appId: "1:485654286517:web:e8df3ca48159dcb01deefc",
            measurementId: "G-RWD8MLEKHT"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const usersCollection = collection(db, "authorizedUsers");

        let currentUsers = [];
        let userToDeleteEmail = null;

        function getTodayDate() {
            const today = new Date();
            return today.toLocaleDateString('id-ID', { day: '2-digit', month: 'short', year: 'numeric' });
        }

        window.renderTable = function(usersToRender = currentUsers) {
            const tbody = document.getElementById('userTableBody');
            document.getElementById('totalUsersCount').innerText = currentUsers.length;
            tbody.innerHTML = '';

            if (usersToRender.length === 0) {
                tbody.innerHTML = `<tr><td colspan="4" class="text-center py-8 text-gray-500">Tidak ada data ditemukan</td></tr>`;
                return;
            }

            usersToRender.forEach(user => {
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td class="py-3 px-4 font-medium text-gray-200">${user.email}</td>
                    <td class="py-3 px-4 text-gray-400 text-xs">${user.date}</td>
                    <td class="py-3 px-4 text-center">
                        <span class="bg-green-500/20 text-green-400 border border-green-500/30 px-2 py-1 rounded-full text-[10px] font-bold tracking-wider">AKTIF</span>
                    </td>
                    <td class="py-3 px-4 text-right">
                        <button onclick="confirmDelete('${user.email}')" class="btn-glow-red px-3 py-1.5 rounded-lg text-xs font-bold text-white flex items-center gap-1 inline-flex">
                            <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
                            Hapus
                        </button>
                    </td>
                `;
                tbody.appendChild(tr);
            });
        };

        window.filterUsers = function() {
            const query = document.getElementById('searchInput').value.toLowerCase();
            const filtered = currentUsers.filter(u => u.email.includes(query));
            window.renderTable(filtered);
        };

        window.closeMessage = function() {
            const msgBox = document.getElementById('messageBox');
            msgBox.classList.add('hidden');
            msgBox.classList.remove('flex');
            setTimeout(() => {
                document.getElementById('messageButtons').innerHTML = `<button onclick="closeMessage()" class="btn-glow-blue px-6 py-2 rounded-xl text-sm font-bold text-white w-full">Tutup</button>`;
            }, 300);
        };

        function showMessage(title, text) {
            document.getElementById('messageTitle').innerText = title;
            document.getElementById('messageText').innerText = text;
            const msgBox = document.getElementById('messageBox');
            msgBox.classList.remove('hidden');
            msgBox.classList.add('flex');
        }

        window.confirmDelete = function(email) {
            userToDeleteEmail = email;
            document.getElementById('messageTitle').innerText = "Cabut Akses?";
            document.getElementById('messageText').innerText = `Yakin ingin menghapus akses untuk ${email}?`;
            
            const btnContainer = document.getElementById('messageButtons');
            btnContainer.innerHTML = `
                <button onclick="closeMessage()" class="px-6 py-2 rounded-xl text-sm font-bold text-gray-300 border border-gray-600 hover:bg-gray-800 transition-all w-full">Batal</button>
                <button onclick="executeDelete()" id="btnYaHapus" class="btn-glow-red px-6 py-2 rounded-xl text-sm font-bold text-white w-full">Ya, Hapus</button>
            `;
            
            const msgBox = document.getElementById('messageBox');
            msgBox.classList.remove('hidden');
            msgBox.classList.add('flex');
        };

        window.executeDelete = async function() {
            if (!userToDeleteEmail) return;
            
            const btnYa = document.getElementById('btnYaHapus');
            if (btnYa) {
                btnYa.innerText = "Sedang Menghapus...";
                btnYa.disabled = true;
                btnYa.classList.add('opacity-50', 'cursor-wait');
            }

            try {
                await deleteDoc(doc(db, "authorizedUsers", userToDeleteEmail));
                document.getElementById('messageButtons').innerHTML = `<button onclick="closeMessage()" class="btn-glow-blue px-6 py-2 rounded-xl text-sm font-bold text-white w-full">Tutup</button>`;
                document.getElementById('messageTitle').innerText = "Berhasil Dihapus!";
                document.getElementById('messageText').innerText = `Akses untuk ${userToDeleteEmail} berhasil dicabut dari sistem.`;
                userToDeleteEmail = null;
            } catch (error) {
                console.error("Error: ", error);
                document.getElementById('messageTitle').innerText = "Gagal Menghapus";
                document.getElementById('messageText').innerText = "Terjadi kesalahan: " + error.message;
                document.getElementById('messageButtons').innerHTML = `<button onclick="closeMessage()" class="btn-glow-blue px-6 py-2 rounded-xl text-sm font-bold text-white w-full">Tutup</button>`;
            }
        };

        // --- LISTENER REALTIME DARI FIRESTORE ---
        onSnapshot(usersCollection, (snapshot) => {
            currentUsers = [];
            snapshot.forEach((docSnap) => {
                currentUsers.push({
                    email: docSnap.data().email,
                    date: docSnap.data().dateAdded || '-',
                    timestamp: docSnap.data().timestamp || 0
                });
            });

            currentUsers.sort((a, b) => b.timestamp - a.timestamp);
            window.renderTable();

            document.getElementById('statusDot').className = "w-3 h-3 rounded-full bg-green-500 shadow-[0_0_10px_#22c55e] animate-pulse";
            document.getElementById('statusText').innerText = "Sistem Online";
            document.getElementById('statusText').className = "text-sm font-semibold text-green-400";
        }, (error) => {
            console.error(error);
            document.getElementById('statusDot').className = "w-3 h-3 rounded-full bg-red-500 shadow-[0_0_10px_#ef4444]";
            document.getElementById('statusText').innerText = "Koneksi Terputus";
            document.getElementById('statusText').className = "text-sm font-semibold text-red-400";
        });

        // --- TAMBAH DATA KE FIRESTORE ---
        document.getElementById('addUserForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const emailInput = document.getElementById('newUserEmail');
            const btn = document.getElementById('addBtn');
            const email = emailInput.value.trim().toLowerCase();

            if (currentUsers.find(u => u.email === email)) {
                showMessage("Peringatan", `Email ${email} sudah terdaftar di sistem!`);
                return;
            }

            btn.innerText = "Menyimpan...";
            btn.disabled = true;

            try {
                await setDoc(doc(db, "authorizedUsers", email), {
                    email: email,
                    dateAdded: getTodayDate(),
                    timestamp: Date.now()
                });
                
                emailInput.value = '';
                showMessage("Sukses!", `Akses untuk ${email} berhasil ditambahkan ke database.`);
            } catch (error) {
                console.error(error);
                showMessage("Error", "Gagal menyimpan. Pastikan config Firebase kamu sudah benar.");
            } finally {
                btn.innerText = "Berikan Akses";
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>
